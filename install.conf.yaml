- defaults:
    link:
      relink: true

- clean: ["~"]

- link:
    ~/.bashrc: bashrc
    ~/.zshrc: zshrc
    ~/.vimrc: vimrc
    ~/env.sh: env.sh
    ~/.config/alacritty:
      create: true
      path: config/alacritty
    ~/.config/nvim:
      create: true
      path: config/nvim
    ~/.tmux.conf: config/tmux/.tmux.conf
    ~/.tmux.conf.local: tmux.conf.local
    ~/.config/kitty:
      create: true
      path: config/kitty
    ~/.config/gitui:
      create: true
      path: config/gitui
    ~/.config/ghostty:
      create: true
      path: config/ghostty
    ~/.config/lazygit:
      create: true
      path: config/lazygit
    ~/.config/tmuxinator/dotfiles.yml: config/tmuxinator/dotfiles.yml
    ~/.config/tmuxinator/figma.yml: config/tmuxinator/figma.yml
    ~/.config/tmuxinator/project.yml: config/tmuxinator/project.yml
    ~/.claude/CLAUDE.md: config/claude/CLAUDE.md
    ~/.claude/settings.json: config/claude/settings.json
    ~/.claude/statusline-command.sh: config/claude/statusline-command.sh

- shell:
    - [git submodule update --init --recursive, Installing submodules]
